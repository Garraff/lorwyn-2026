<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario MTG - Versión Estable Español</title>
    <link href="https://cdn.jsdelivr.net/npm/keyrune@latest/css/keyrune.css" rel="stylesheet" type="text/css" />
    <style>
        :root {
            --bg: #1a1a1a;
            --sidebar-bg: #121212;
            --card-bg: #2d2d2d;
            --accent: #6c5ce7;
            --text: #ffffff;
            --gold: #f1c40f;
            --success: #00b894;
        }

        #app-container { display: flex; height: 100vh; width: 100vw; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; overflow: hidden; }

        /* COLORES ORIGINALES */
        .ss-lrw { color: #f1c40f !important; }
        .ss-som { color: #bdc3c7 !important; }
        .ss-mbs { color: #e67e22 !important; }
        .ss-nph { color: #e74c3c !important; }
        .ss-spm { color: #ff4757 !important; }

        .sidebar-left { width: 220px; background: var(--sidebar-bg); border-right: 2px solid var(--accent); padding: 20px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        .set-option { display: flex; align-items: center; gap: 12px; background: #252525; color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; text-align: left; font-size: 0.85rem; }
        .set-option:hover { border-color: var(--gold); }
        .set-option.active { border-color: var(--accent); background: rgba(108, 92, 231, 0.2); }
        .set-option i { font-size: 1.2rem; width: 25px; text-align: center; }

        .main-content { flex-grow: 1; overflow-y: auto; padding: 20px; position: relative; }
        .header-app { background: var(--card-bg); padding: 15px 25px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--accent); margin-bottom: 15px; position: sticky; top: 0; z-index: 100; }
        
        .table-container { background: var(--card-bg); border-radius: 12px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #444; text-align: left; }
        .card-name { color: #81ecec; cursor: pointer; font-weight: bold; }

        .sidebar-right { width: 260px; background: var(--sidebar-bg); border-left: 1px solid #333; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .widget { background: #222; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .filter-btn { width: 100%; padding: 8px; margin-bottom: 5px; background: #333; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; }
        
        .progress-container { background: #111; height: 10px; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .progress-bar { background: var(--success); height: 100%; width: 0%; transition: 0.5s; }

        #gallery-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; display: none; padding-bottom: 50px; }
        .gallery-item { background: #222; padding: 5px; border-radius: 8px; text-align: center; border: 1px solid #444; }
        .gallery-item img { width: 100%; border-radius: 5px; display: block; }

        #card-preview { position: fixed; display: none; width: 260px; z-index: 9999; pointer-events: none; border-radius: 15px; border: 2px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #loader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 20px; border-radius: 10px; color: var(--gold); display: none; z-index: 2000; border: 1px solid var(--gold); }
        input[type="number"] { width: 45px; background: #111; color: white; border: 1px solid #444; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="sidebar-left">
            <h3 style="color:var(--gold); font-size:0.7rem; text-align:center; letter-spacing: 2px;">COLECCIONES</h3>
            <button class="set-option" onclick="changeSet('lrw', 'Lorwyn', 'ss-lrw')"><i class="ss ss-lrw"></i> Lorwyn</button>
            <button class="set-option" onclick="changeSet('som', 'Mirrodin', 'ss-som')"><i class="ss ss-som"></i> Mirrodin</button>
            <button class="set-option" onclick="changeSet('mbs', 'Sitiado', 'ss-mbs')"><i class="ss ss-mbs"></i> Sitiado</button>
            <button class="set-option" onclick="changeSet('nph', 'Phyrexia', 'ss-nph')"><i class="ss ss-nph"></i> Phyrexia</button>
            <button class="set-option" onclick="changeSet('spm', 'Spider-Man', 'ss-spm')"><i class="ss ss-spm"></i> Spider-Man</button>
            
            <hr style="border:0; border-top: 1px solid #333; margin:15px 0;">
            <button class="filter-btn" onclick="switchView('list')">☰ Ver Lista</button>
            <button class="filter-btn" onclick="switchView('gallery')">🖼 Ver Galería</button>
        </div>

        <div class="main-content">
            <div id="loader">🔮 Invocando cartas en español...</div>
            <div class="header-app">
                <div style="display:flex; align-items:center; gap:15px;">
                    <i id="header-icon" class="ss ss-lrw" style="font-size:2.5rem;"></i>
                    <h2 id="current-set-title" style="margin:0; letter-spacing:1px; text-transform: uppercase;">LORWYN</h2>
                </div>
                <button onclick="saveCollection()" style="background:var(--success); color:white; border:none; padding:12px 25px; border-radius:8px; cursor:pointer; font-weight:bold;">💾 GUARDAR PROGRESO</button>
            </div>

            <div id="list-view" class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width:30px">V</th>
                            <th style="width:40px">#</th>
                            <th>Nombre de la Carta</th>
                            <th style="width:50px">Poseo</th>
                            <th style="width:60px">Extra</th>
                            <th style="width:50px">Foil</th>
                        </tr>
                    </thead>
                    <tbody id="card-list-body"></tbody>
                </table>
            </div>
            <div id="gallery-view"></div>
        </div>

        <div class="sidebar-right">
            <div class="widget">
                <h3>🔍 Buscador</h3>
                <input type="text" id="search" style="width:90%; padding:10px; background:#111; border:1px solid #444; color:white; border-radius:6px;" placeholder="Buscar en español..." onkeyup="filterCards()">
            </div>
            <div class="widget">
                <h3>📈 Progreso Set</h3>
                <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
                <div id="p-count" style="text-align:center; font-weight:bold; color:var(--gold);">0 / 0</div>
            </div>
            <div class="widget" style="margin-top:auto; background: rgba(108, 92, 231, 0.1);">
                <h3>Total Archivador</h3>
                <div id="total-stats" style="font-size: 1.5rem; font-weight: bold; text-align: center; color: var(--success);">0</div>
            </div>
        </div>
    </div>

    <img id="card-preview" src="">

    <script>
        let allCardsData = [];
        let currentSet = 'lrw';
        const preview = document.getElementById('card-preview');

        async function loadAll() {
            document.getElementById('loader').style.display = 'block';
            try {
                // Buscamos cartas en español (lang:es)
                let url = `https://api.scryfall.com/cards/search?q=set:${currentSet}+lang:es&order=set&unique=prints`;
                let res = await fetch(url);
                let data = await res.json();
                
                // Si el set no existe en español, cargamos el normal
                if (data.status === 404) {
                    url = `https://api.scryfall.com/cards/search?q=set:${currentSet}&order=set&unique=prints`;
                    res = await fetch(url);
                    data = await res.json();
                }

                allCardsData = data.data || [];

                let nextUrl = data.next_page;
                while (nextUrl) {
                    let nextRes = await fetch(nextUrl);
                    let nextData = await nextRes.json();
                    allCardsData = allCardsData.concat(nextData.data);
                    nextUrl = nextData.next_page;
                }

                renderAll();
                loadCollection();
                calc();
            } catch (e) { console.error("Error", e); }
            document.getElementById('loader').style.display = 'none';
        }

        function renderAll() {
            const listBody = document.getElementById('card-list-body');
            const gallery = document.getElementById('gallery-view');
            listBody.innerHTML = ''; gallery.innerHTML = '';

            allCardsData.forEach(c => {
                // Usamos el nombre y la imagen en español
                const name = c.printed_name || c.name;
                const img = c.image_uris ? c.image_uris.normal : (c.card_faces ? c.card_faces[0].image_uris.normal : "");
                
                const tr = document.createElement('tr');
                tr.className = 'card-row';
                tr.dataset.num = c.collector_number;
                tr.dataset.name = name.toLowerCase();
                tr.innerHTML = `
                    <td><button style="background:none; border:1px solid #444; color:var(--success); cursor:pointer;" onclick="quickToggle('${c.collector_number}')">✅</button></td>
                    <td style="color:#777; font-size:0.8rem;">${c.collector_number}</td>
                    <td><span class="card-name preview-trigger" data-img="${img}">${name}</span></td>
                    <td><input type="checkbox" class="c-have" onchange="calc()"></td>
                    <td><input type="number" class="c-extra" value="0" min="0" onchange="calc()"></td>
                    <td><input type="checkbox" class="c-foil" onchange="calc()"></td>
                `;
                listBody.appendChild(tr);

                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `<img src="${img}" class="preview-trigger" data-img="${img}" loading="lazy" onclick="quickToggle('${c.collector_number}')">`;
                gallery.appendChild(div);
            });
            initHover();
        }

        async function changeSet(setCode, setName, iconClass) {
            currentSet = setCode;
            document.getElementById('current-set-title').innerText = setName;
            document.getElementById('header-icon').className = 'ss ' + iconClass;
            
            document.querySelectorAll('.set-option').forEach(b => {
                b.classList.remove('active');
                if(b.innerText.trim().toLowerCase() === setName.toLowerCase()) b.classList.add('active');
            });
            await loadAll();
        }

        function quickToggle(num) {
            const tr = document.querySelector(`tr[data-num="${num}"]`);
            if(tr) { 
                const chk = tr.querySelector('.c-have');
                chk.checked = !chk.checked; 
                calc(); 
            }
        }

        function calc() {
            const haves = document.querySelectorAll('.c-have:checked').length;
            let extras = 0;
            document.querySelectorAll('.c-extra').forEach(i => extras += parseInt(i.value || 0));
            const totalSet = allCardsData.length;
            const percent = totalSet > 0 ? Math.round((haves / totalSet) * 100) : 0;
            const bar = document.getElementById('progress-bar');
            if(bar) bar.style.width = percent + '%';
            document.getElementById('p-count').innerText = `${haves} / ${totalSet}`;
            document.getElementById('total-stats').innerText = haves + extras;
        }

        function filterCards() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.card-row').forEach(row => {
                row.style.display = row.dataset.name.includes(q) ? '' : 'none';
            });
        }

        function switchView(view) {
            document.getElementById('list-view').style.display = view === 'list' ? 'block' : 'none';
            document.getElementById('gallery-view').style.display = view === 'gallery' ? 'grid' : 'none';
        }

        function initHover() {
            document.querySelectorAll('.preview-trigger').forEach(item => {
                item.onmouseenter = () => { preview.src = item.getAttribute('data-img'); preview.style.display = 'block'; };
                item.onmousemove = (e) => { 
                    let x = e.clientX + 20;
                    if (x + 260 > window.innerWidth) x = e.clientX - 280;
                    preview.style.left = x + 'px'; 
                    preview.style.top = (e.clientY - 150) + 'px'; 
                };
                item.onmouseleave = () => { preview.style.display = 'none'; };
            });
        }

        function saveCollection() {
            const data = Array.from(document.querySelectorAll('.card-row')).map(tr => ({
                id: tr.dataset.num, 
                h: tr.querySelector('.c-have').checked, 
                e: tr.querySelector('.c-extra').value, 
                f: tr.querySelector('.c-foil').checked
            }));
            localStorage.setItem('mtg_inv_' + currentSet, JSON.stringify(data));
            alert("💾 Guardado correctamente.");
        }

        function loadCollection() {
            const saved = JSON.parse(localStorage.getItem('mtg_inv_' + currentSet));
            if (saved) {
                saved.forEach(item => {
                    const tr = document.querySelector(`tr[data-num="${item.id}"]`);
                    if (tr) {
                        tr.querySelector('.c-have').checked = item.h;
                        tr.querySelector('.c-extra').value = item.e;
                        tr.querySelector('.c-foil').checked = item.f;
                    }
                });
            }
        }

        window.onload = () => changeSet('lrw', 'Lorwyn', 'ss-lrw');
    </script>
</body>
</html>
